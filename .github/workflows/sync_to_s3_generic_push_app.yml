name: Library - Push App to S3

on:
  workflow_call:
    inputs:
      refspec:
        description: "The commit SHA"
        type: string
        required: true
      environment:
        description: "Environment to deploy to"
        type: string
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Push App to S3
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-west-2
      ONE_PASS_ENV: passport-xyz-${{ inputs.environment }}-env

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.refspec }}

      - uses: actions/download-artifact@v4
        with:
          name: passport-app-${{ inputs.environment }}
          path: app/out

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ inputs.environment == 'production' && '559026686882' || '515520736917' }}:role/pulumi-ci-passport-${{ inputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: infra/yarn.lock

      - name: Install infra deps
        working-directory: infra
        run: yarn install --frozen-lockfile

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5
        with:
          pulumi-version: latest

      - name: Pulumi login (S3 backend)
        run: pulumi login s3://passportxyz-pulumi-state
        shell: bash

      - name: Get Pulumi Stack Outputs
        id: get_pulumi_outputs
        working-directory: infra/aws
        shell: bash
        run: |
          pulumi stack select ${{ inputs.environment }}
          BUCKET_NAME=$(pulumi stack output passportAppBucketName)
          CLOUDFRONT_ID=$(pulumi stack output passportAppDistributionId)

          if [[ -z "$BUCKET_NAME" || -z "$CLOUDFRONT_ID" ]]; then
            echo "Error: Failed to retrieve Pulumi stack outputs!"
            exit 1
          fi

          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_ENV
          echo "CLOUDFRONT_ID=$CLOUDFRONT_ID" >> $GITHUB_ENV

      - name: Sync Files to S3
        working-directory: app
        run: |
          if [ -d "out" ]; then
              aws s3 sync ./out s3://${{ env.BUCKET_NAME }} --delete
          else
              echo "out folder not found!"
              exit 1
          fi

      - name: Create CloudFront Invalidation
        id: create_invalidation
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
          --distribution-id ${{ env.CLOUDFRONT_ID }} \
          --paths "/*" \
          --query 'Invalidation.Id' \
          --output text)

          if [[ -z "$INVALIDATION_ID" ]]; then
            echo "CloudFront invalidation failed!"
            exit 1
          fi

          echo "INVALIDATION_ID=$INVALIDATION_ID" >> $GITHUB_ENV

      - name: Wait for Invalidation Completion
        id: check_invalidation
        run: |
          echo "Waiting for invalidation ID: ${{ env.INVALIDATION_ID }}"
          for i in {1..20}; do
              STATUS=$(aws cloudfront get-invalidation \
              --distribution-id ${{ env.CLOUDFRONT_ID }} \
              --id ${{ env.INVALIDATION_ID }} \
              --query 'Invalidation.Status' \
              --output text)
              echo "Invalidation Status: $STATUS"
              if [ "$STATUS" == "Completed" ]; then
                  echo "CloudFront invalidation completed successfully."
                  exit 0
              fi
              if [ "$STATUS" == "Failed" ]; then
                  echo "CloudFront invalidation failed!"
                  exit 1
              fi
              sleep 15
          done
          echo "CloudFront invalidation check timed out!"
          exit 1

      - name: Deployment Completed
        run: echo "Deployment and CloudFront invalidation successful!"
